version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: test-intel-postgres
    environment:
      POSTGRES_USER: test_intel
      POSTGRES_PASSWORD: test_intel
      POSTGRES_DB: test_intel
    ports:
      - "5432:5432"
    volumes:
      - pgdata_test_intel:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_intel -d test_intel"]
      interval: 5s
      timeout: 3s
      retries: 20

  metabase:
    image: metabase/metabase:latest
    container_name: test-intel-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: test_intel
      MB_DB_PASS: test_intel
      MB_DB_SCHEMA: public
    depends_on:
      postgres:
        condition: service_healthy

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: test-intel-fake-gcs
    command:
      ["-scheme", "http", "-port", "4443", "-public-host", "localhost:4443"]
    ports:
      - "4443:4443"
    volumes:
      - gcsdata_test_intel:/data

  # ── Selenium Grid (optional — only starts with: docker compose --profile jenkins up) ──
  # Provides a headless Chromium browser for the selenium-acceptance-* Jenkins jobs.
  # The Jenkins container connects to it via http://selenium:4444/wd/hub.
  #
  # Image note: selenium/standalone-chrome has no ARM64 manifest (Apple Silicon).
  # seleniarm/standalone-chromium is the official ARM64-compatible equivalent,
  # maintained by the Selenium project. It uses Chromium instead of Chrome —
  # no functional difference for headless WebDriver testing.
  #
  # Debug: add port 7900:7900 and open http://localhost:7900 to watch the browser live (no password).
  selenium:
    image: seleniarm/standalone-chromium:latest
    container_name: test-intel-selenium
    profiles: ["jenkins"]
    shm_size: 2g
    ports:
      - "4444:4444" # Selenium Grid UI + WebDriver endpoint
    environment:
      SE_NODE_MAX_SESSIONS: 4
      SE_SESSION_REQUEST_TIMEOUT: 300

  # ── Local Jenkins (optional — only starts with: docker compose --profile jenkins up) ──
  # Provides a self-contained Jenkins instance for testing the Trapeze ingest
  # pipeline locally before deploying to the production Jenkins farm.
  #
  # Key advantages over running scripts directly:
  #   • Validates Groovy pipeline DSL syntax and Jenkins credential configuration
  #   • Jenkins container reaches Postgres at postgres:5432 (Docker service name)
  #     and fake-gcs at fake-gcs:4443 — DB access problem solved in dev
  #   • Mirrors the production environment: same Node.js version, same tool paths
  #
  # Usage:
  #   docker compose --profile jenkins up -d
  #   open http://localhost:8080   (admin / trapeze-local)
  #
  # First run: Jenkins will need the Pipeline and NodeJS plugins installed.
  # These are pre-installed by Dockerfile.jenkins.
  #
  # Production path: when Postgres moves to Cloud SQL, point prod Jenkins at the
  # cloud DATABASE_URL credential; this local service becomes a validation harness only.
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: test-intel-jenkins
    profiles: ["jenkins"]
    ports:
      - "8080:8080" # Jenkins UI
      - "50000:50000" # Jenkins agent JNLP port
    environment:
      # ── Trapeze env vars — inherited by pipeline steps ──────────────────
      # Postgres is reachable via the service name on the Docker network
      DATABASE_URL: "postgresql://test_intel:test_intel@postgres:5432/test_intel?schema=public"
      # GCS emulator: use service name, not localhost, inside Docker
      GCS_EMULATOR_HOST: "fake-gcs:4443"
      GCS_BUCKET: "test-intel-artifacts"
      GCS_PROJECT: "test-intel-local"
      # ── Shared library + credential seeding ─────────────────────────────
      # TRAPEZE_REPO_URL: used by 03-create-jobs.groovy and 04-register-shared-library.groovy
      #   Default: file:///workspace/trapeze (the volume mount below) — works without SSH.
      #   Override in .env to point at the remote Git URL for production-parity testing.
      TRAPEZE_REPO_URL: "${TRAPEZE_REPO_URL:-file:///workspace/trapeze}"
      # EVITE_PLAYWRIGHT_REPO_URL: used by 03-create-jobs.groovy for the playwright-acceptance job.
      #   Default: file:///workspace/evite-playwright (volume mount below) — works without SSH.
      #   Override in .env to point at a remote Git URL.
      EVITE_PLAYWRIGHT_REPO_URL: "${EVITE_PLAYWRIGHT_REPO_URL:-file:///workspace/evite-playwright}"
      # GCS_SA_KEY_PATH: path *inside the container* to the GCP service account JSON key.
      #   The volume mount below maps GCS_SA_KEY_PATH_HOST (host path from .env) to this
      #   container path.  02-seed-credentials.groovy reads the file at this path.
      #   In dev with fake-gcs, leave GCS_SA_KEY_PATH_HOST unset — the seeder skips
      #   trapeze-gcs-credentials gracefully when the file is missing.
      GCS_SA_KEY_PATH: "/run/secrets/gcs-sa-key.json"
      # Jira / TestRail — loaded from host .env at container start via env_file
      # ── Jenkins initial admin password shortcut ──────────────────────────
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    env_file:
      # Loads JIRA_*, TESTRAIL_*, and any TRAPEZE_REPO_URL override from the host .env.
      # The DATABASE_URL and GCS_* above take precedence over values in .env.
      - .env
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount the repo read-only so pipeline steps can call npm scripts and
      # the init scripts can use file:///workspace/trapeze as the SCM URL.
      - .:/workspace/trapeze:ro
      # Shadow the host's node_modules (macOS darwin-arm64 binaries) with a
      # named volume seeded from the image layer (linux-arm64 binaries built
      # by `npm ci` in Dockerfile.jenkins). Without this, esbuild/tsx crash
      # with "no matching manifest for linux/arm64" when the host repo was
      # installed on macOS. The named volume is populated from the image on
      # first `docker compose up` and persists across container restarts.
      - trapeze_node_modules:/workspace/trapeze/node_modules
      # GCS service account key (optional — only needed for real GCS, not fake-gcs).
      # Set GCS_SA_KEY_PATH_HOST=/path/to/sa-key.json in .env to enable.
      # Leave unset (or set to /dev/null) for local dev with fake-gcs.
      - ${GCS_SA_KEY_PATH_HOST:-/dev/null}:/run/secrets/gcs-sa-key.json:ro
      # evite-playwright repo (read-only) — used by the playwright-acceptance pipeline job.
      # Set EVITE_PLAYWRIGHT_DIR=/path/to/evite-playwright in .env to override.
      - ${EVITE_PLAYWRIGHT_DIR:-../evite-playwright}:/workspace/evite-playwright:ro
    depends_on:
      postgres:
        condition: service_healthy
      fake-gcs:
        condition: service_started

volumes:
  pgdata_test_intel:
  gcsdata_test_intel:
  jenkins_home:
  trapeze_node_modules: # linux-arm64 node_modules; seeded from Dockerfile.jenkins image layer
