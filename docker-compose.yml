version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: test-intel-postgres
    environment:
      POSTGRES_USER: test_intel
      POSTGRES_PASSWORD: test_intel
      POSTGRES_DB: test_intel
    ports:
      - "5432:5432"
    volumes:
      - pgdata_test_intel:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_intel -d test_intel"]
      interval: 5s
      timeout: 3s
      retries: 20

  metabase:
    image: metabase/metabase:latest
    container_name: test-intel-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: test_intel
      MB_DB_PASS: test_intel
      MB_DB_SCHEMA: public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_test_intel:
